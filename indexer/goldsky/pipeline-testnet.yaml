# Goldsky Turbo Pipeline for Smart Account Kit Event Indexing - TESTNET
#
# Testnet now supports Turbo datasets. Keep this pipeline pinned to the
# current Turbo dataset version and start from the current month boundary
# so the indexer can catch up quickly after resets without replaying the
# entire current testnet epoch.
#
# start_at is pinned to the first ledger at or after 2026-04-01T00:00:00Z.
# Verified against Horizon testnet ledger close times on April 6, 2026:
# ledger 1,799,808 closed at 2026-04-01T00:00:02Z.
#
# This pipeline indexes all smart account events from Stellar to enable
# reverse lookups from signer public keys to contract IDs and full state tracking.
#
# Events indexed:
# - context_rule_added: When a new context rule is created with signers
# - context_rule_meta_updated: When a context rule's metadata is updated
# - context_rule_removed: When a context rule is deleted
# - signer_added: When a signer is added to a context rule
# - signer_removed: When a signer is removed from a context rule
# - signer_registered: When a signer enters the global registry
# - signer_deregistered: When a signer leaves the global registry
# - policy_added: When a policy is added to a context rule
# - policy_removed: When a policy is removed from a context rule
# - policy_registered: When a policy enters the global registry
# - policy_deregistered: When a policy leaves the global registry
#
# Deployment:
#   goldsky turbo apply ./pipeline-testnet.yaml

name: smart-account-signers-testnet
resource_size: xl

sources:
  stellar_events:
    type: dataset
    dataset_name: stellar_testnet.events
    version: 1.2.0
    start_at: 1799808

transforms:
  signer_events:
    type: sql
    sql: |
      SELECT
        id,
        ledger_sequence,
        ledger_closed_at,
        contract_id,
        topics,
        data,
        CASE
          WHEN topics LIKE '%context_rule_added%' THEN 'context_rule_added'
          WHEN topics LIKE '%context_rule_meta_updated%' THEN 'context_rule_meta_updated'
          WHEN topics LIKE '%context_rule_removed%' THEN 'context_rule_removed'
          WHEN topics LIKE '%signer_added%' THEN 'signer_added'
          WHEN topics LIKE '%signer_removed%' THEN 'signer_removed'
          WHEN topics LIKE '%signer_registered%' THEN 'signer_registered'
          WHEN topics LIKE '%signer_deregistered%' THEN 'signer_deregistered'
          WHEN topics LIKE '%policy_added%' THEN 'policy_added'
          WHEN topics LIKE '%policy_removed%' THEN 'policy_removed'
          WHEN topics LIKE '%policy_registered%' THEN 'policy_registered'
          WHEN topics LIKE '%policy_deregistered%' THEN 'policy_deregistered'
          ELSE 'unknown'
        END AS event_type,
        transaction_hash
      FROM stellar_events
      WHERE
        in_successful_contract_call = true
        AND (
          topics LIKE '%context_rule_added%'
          OR topics LIKE '%context_rule_meta_updated%'
          OR topics LIKE '%context_rule_removed%'
          OR topics LIKE '%signer_added%'
          OR topics LIKE '%signer_removed%'
          OR topics LIKE '%signer_registered%'
          OR topics LIKE '%signer_deregistered%'
          OR topics LIKE '%policy_added%'
          OR topics LIKE '%policy_removed%'
          OR topics LIKE '%policy_registered%'
          OR topics LIKE '%policy_deregistered%'
        )
    primary_key: id

sinks:
  postgres_signers:
    type: postgres
    secret_name: HOSTED_POSTGRES_CMIVUAPAK0
    from: signer_events
    table: smart_account_signer_events
    schema: public
    primary_key: id
